<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>My Store</h1>
  </header>

  <div class="container">

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="Product 1">
      <h2>Product 1</h2>
      <p class="price">₹999</p>
      <p>Good quality item</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="Product 2">
      <h2>Product 2</h2>
      <p class="price">₹1499</p>
      <p>Best seller product</p>
      <button>Add to Cart</button>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300" alt="Product 3">
      <h2>Product 3</h2>
      <p class="price">₹799</p>
      <p>Affordable and durable</p>
      <button>Add to Cart</button>
    </div>

  </div>

  <footer>
    <p>© 2026 My Store</p>
  </footer>

</body>
</html>
